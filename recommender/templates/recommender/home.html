<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Perfume Fit AI Recommender</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f7f2ea;
            --panel: #fffaf4;
            --text: #1f1a17;
            --muted: #6d5b50;
            --accent: #bc6c25;
            --accent-dark: #8a4f1d;
            --line: #e8d7c6;
            --shadow: 0 20px 50px rgba(76, 51, 31, 0.12);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Georgia, "Times New Roman", serif;
            background:
                radial-gradient(circle at top, rgba(188, 108, 37, 0.14), transparent 30%),
                linear-gradient(180deg, #fcf7f1 0%, var(--bg) 100%);
            color: var(--text);
        }

        .shell {
            width: min(1080px, calc(100% - 32px));
            margin: 48px auto;
            display: grid;
            gap: 24px;
        }

        .hero,
        .panel {
            background: rgba(255, 250, 244, 0.94);
            border: 1px solid var(--line);
            border-radius: 24px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(10px);
        }

        .hero {
            padding: 40px;
        }

        .eyebrow {
            margin: 0 0 12px;
            color: var(--accent-dark);
            letter-spacing: 0.14em;
            text-transform: uppercase;
            font-size: 0.8rem;
        }

        h1 {
            margin: 0;
            font-size: clamp(2.4rem, 5vw, 4.8rem);
            line-height: 0.95;
            max-width: 11ch;
        }

        .subcopy {
            max-width: 58ch;
            color: var(--muted);
            font-size: 1.06rem;
            line-height: 1.6;
        }

        .store-link {
            color: var(--accent-dark);
            text-decoration-thickness: 2px;
            text-underline-offset: 3px;
        }

        .panel {
            padding: 28px;
        }

        form {
            display: grid;
            gap: 18px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
        }

        label {
            display: grid;
            gap: 8px;
            font-size: 0.95rem;
        }

        input,
        textarea,
        button {
            font: inherit;
        }

        input,
        textarea {
            border: 1px solid var(--line);
            border-radius: 16px;
            padding: 14px 16px;
            background: #fff;
            color: var(--text);
        }

        textarea {
            min-height: 132px;
            resize: vertical;
        }

        button {
            width: fit-content;
            border: 0;
            border-radius: 999px;
            padding: 14px 22px;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            color: #fff;
            cursor: pointer;
        }

        #results {
            display: grid;
            gap: 16px;
        }

        .result-card {
            border: 1px solid var(--line);
            border-radius: 20px;
            padding: 20px;
            background: #fff;
        }

        .product-image {
            width: 100%;
            max-width: 220px;
            aspect-ratio: 1;
            object-fit: cover;
            border-radius: 18px;
            border: 1px solid var(--line);
            margin-bottom: 16px;
            background: #f7f2ea;
        }

        .result-head {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            align-items: baseline;
            flex-wrap: wrap;
        }

        .result-name {
            margin: 0;
            font-size: 1.5rem;
        }

        .badge {
            display: inline-block;
            border-radius: 999px;
            padding: 6px 10px;
            background: #f6e7d7;
            color: var(--accent-dark);
            font-size: 0.9rem;
        }

        .meta,
        .empty-state {
            color: var(--muted);
            line-height: 1.6;
        }

        @media (max-width: 720px) {
            .hero,
            .panel {
                padding: 24px;
                border-radius: 20px;
            }
        }
    </style>
</head>
<body>
    <main class="shell">
        <section class="hero">
            <p class="eyebrow">Django Demo</p>
            <h1>Perfume Fit AI Recommender</h1>
            <p class="subcopy">
                Turn simple scent preferences into perfume picks your shoppers can act on. Every API response includes a direct store link to
                <a class="store-link" href="{{ store_url }}" target="_blank" rel="noreferrer">{{ store_url }}</a>.
            </p>
        </section>

        <section class="panel">
            <form id="recommender-form">
                <label>
                    What are you looking for?
                    <textarea name="prompt" placeholder="Example: I want something cozy and sweet for winter date nights."></textarea>
                </label>

                <div class="grid">
                    <label>
                        Favorite notes
                        <input name="notes" placeholder="vanilla, amber, bergamot">
                    </label>
                    <label>
                        Avoid notes
                        <input name="avoid_notes" placeholder="oud, leather">
                    </label>
                    <label>
                        Mood
                        <input name="mood" placeholder="clean, romantic, bold">
                    </label>
                    <label>
                        Occasion
                        <input name="occasion" placeholder="office, date night, beach">
                    </label>
                    <label>
                        Season
                        <input name="season" placeholder="spring, summer, fall, winter">
                    </label>
                </div>

                <button type="submit">Get Recommendations</button>
            </form>
        </section>

        <section class="panel">
            <div id="results" class="empty-state">Submit the form to see your top perfume matches.</div>
        </section>
    </main>

    <script>
        const form = document.getElementById("recommender-form");
        const results = document.getElementById("results");

        form.addEventListener("submit", async (event) => {
            event.preventDefault();
            const formData = new FormData(form);
            const payload = Object.fromEntries(formData.entries());

            results.textContent = "Finding your best matches...";

            const response = await fetch("/api/recommend/", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(payload)
            });

            const data = await response.json();

            if (!response.ok || !data.recommendations.length) {
                results.innerHTML = `<div class="result-card"><p class="meta">${data.message}</p></div>`;
                return;
            }

            results.innerHTML = data.recommendations.map((item) => `
                <article class="result-card">
                    ${item.image_url ? `<img class="product-image" src="${item.image_url}" alt="${item.name}">` : ""}
                    <div class="result-head">
                        <h2 class="result-name">${item.name}</h2>
                        <span class="badge">Confidence ${Math.round(item.match_confidence * 100)}%</span>
                    </div>
                    <p>${item.description}</p>
                    <p class="meta"><strong>Brand:</strong> ${item.brand || "Unknown"}${item.price ? ` | <strong>Price:</strong> ${item.price}` : ""}</p>
                    <p class="meta">${item.why_it_matches}</p>
                    ${item.notes.length ? `<p class="meta"><strong>Detected notes:</strong> ${item.notes.join(", ")}</p>` : ""}
                    <p class="meta"><a class="store-link" href="${item.product_url}" target="_blank" rel="noreferrer">View on Perfume Fit</a></p>
                </article>
            `).join("");
        });
    </script>
</body>
</html>
